name: Build Geode Mod

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    name: Windows Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: latest
          target: Win64
          combine: true
